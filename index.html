<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #f5f4f2;
    --surface: #ffffff;
    --surface2: #f0efed;
    --border: #e8e6e1;
    --text: #1a1816;
    --text-muted: #9b9690;
    --accent: #2d6ef5;
    --accent-dark: #1d5de0;
    --online: #22c55e;
    --danger: #ef4444;
    --safe: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
  }

  .screen.hidden {
    transform: translateX(100%);
    opacity: 0;
    pointer-events: none;
  }

  .screen.slide-left {
    transform: translateX(-100%);
    opacity: 0;
    pointer-events: none;
  }

  /* ── LOGIN ── */
  #loginScreen {
    justify-content: center;
    align-items: center;
    padding: 32px 28px;
    gap: 0;
  }

  .login-card {
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border-radius: 24px;
    padding: 40px 28px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.08);
  }

  .login-icon { font-size: 44px; line-height: 1; }

  .login-card h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
    text-align: center;
  }

  .login-card p {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    margin-top: -10px;
    line-height: 1.5;
  }

  .field {
    width: 100%;
    background: var(--surface2);
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  .field:focus { border-color: var(--accent); }
  .field::placeholder { color: var(--text-muted); }

  .btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    -webkit-appearance: none;
  }

  .btn:active { background: var(--accent-dark); transform: scale(0.97); }
  .btn.secondary { background: var(--surface2); color: var(--text); }
  .btn.secondary:active { background: var(--border); }
  .btn.danger { background: #fee2e2; color: var(--danger); }

  .err { font-size: 13px; color: var(--danger); text-align: center; min-height: 16px; }

  /* ── GROUPS SCREEN ── */
  #groupsScreen { background: var(--surface); }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 14px;
    padding-top: calc(16px + env(safe-area-inset-top, 0px));
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .topbar-title { font-size: 18px; font-weight: 600; color: var(--text); flex: 1; letter-spacing: -0.2px; }
  .topbar-sub { font-size: 12px; color: var(--text-muted); }

  .avatar-sm {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: white;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 38px; height: 38px;
    background: var(--surface2);
    border: none; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .icon-btn:active { background: var(--border); }

  .groups-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }

  .groups-list::-webkit-scrollbar { display: none; }

  .group-card {
    background: var(--surface2);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    border: 1.5px solid transparent;
    position: relative;
  }

  .group-card:active { transform: scale(0.98); background: var(--border); }
  .group-card.joined { border-color: var(--accent); background: #eef2ff; }

  .group-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .group-info { flex: 1; min-width: 0; }
  .group-name { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .group-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  .group-arrow { color: var(--text-muted); font-size: 18px; }
  .group-lock { font-size: 14px; }

  .unread-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .empty-groups {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 14px;
    padding-bottom: 60px;
  }

  .empty-groups span:first-child { font-size: 40px; }

  .fab {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    right: 20px;
    width: 56px; height: 56px;
    border-radius: 18px;
    background: var(--accent);
    color: white;
    border: none;
    font-size: 26px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(45,110,245,0.4);
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    z-index: 10;
  }
  .fab:active { transform: scale(0.92); background: var(--accent-dark); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: flex-end;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    width: 100%;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 24px 24px calc(24px + env(safe-area-inset-bottom, 0px));
    display: flex;
    flex-direction: column;
    gap: 16px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-overlay.show .modal { transform: translateY(0); }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto -4px;
  }

  .modal h2 { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
  .modal p { font-size: 13px; color: var(--text-muted); margin-top: -8px; line-height: 1.5; }
  .modal label { font-size: 13px; font-weight: 500; color: var(--text-muted); display: block; margin-bottom: 6px; }

  /* ── CHAT SCREEN ── */
  #chatScreen { background: var(--surface); }

  .chat-topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    padding-top: calc(12px + env(safe-area-inset-top, 0px));
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .back-btn {
    width: 38px; height: 38px;
    background: var(--surface2);
    border: none; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
    color: var(--text);
  }
  .back-btn:active { background: var(--border); }

  .chat-group-icon {
    width: 38px; height: 38px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .chat-group-info { flex: 1; min-width: 0; }
  .chat-group-name { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-group-members { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }
  .messages::-webkit-scrollbar { display: none; }

  .day-divider {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    padding: 8px 0;
    font-weight: 500;
  }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 7px;
    animation: fadeUp 0.15s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.out { flex-direction: row-reverse; }

  .msg-avatar-sm {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: white;
    flex-shrink: 0;
    margin-bottom: 2px;
    align-self: flex-end;
  }

  .msg-row.out .msg-avatar-sm { display: none; }

  .msg-col { display: flex; flex-direction: column; gap: 2px; max-width: 78%; }
  .msg-row.out .msg-col { align-items: flex-end; }

  .msg-sender { font-size: 11px; font-weight: 600; padding: 0 4px; }

  .bubble {
    padding: 9px 13px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.45;
    word-break: break-word;
  }

  .msg-row.in .bubble {
    background: var(--surface2);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .msg-row.out .bubble {
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg-time { font-size: 10px; color: var(--text-muted); padding: 0 4px; }

  .typing-bar {
    padding: 2px 16px 2px;
    font-size: 12px;
    color: var(--text-muted);
    min-height: 18px;
    flex-shrink: 0;
    font-style: italic;
  }

  /* INPUT */
  .input-area {
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border-radius: 20px;
    display: flex;
    align-items: flex-end;
    padding: 10px 14px;
  }

  .input-wrap textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--text);
    resize: none;
    max-height: 100px;
    line-height: 1.4;
    -webkit-appearance: none;
  }

  .input-wrap textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:active { transform: scale(0.92); background: var(--accent-dark); }

  .loading-msgs {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 14px;
    flex-direction: column; gap: 10px;
  }

  .spinner {
    width: 22px; height: 22px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tag {
    display: inline-block;
    background: var(--accent-light, #eef2ff);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
  }

  /* Loading spinner overlay */
  .btn-loading { position: relative; color: transparent !important; }
  .btn-loading::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .btn.secondary.btn-loading::after { border-color: rgba(0,0,0,0.15); border-top-color: var(--text); }
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div class="screen" id="loginScreen">
  <div class="login-card">
    <div class="login-icon">💬</div>
    <h1>Welcome to Chat</h1>
    <p>Pick a username to get started — no account needed</p>
    <input class="field" type="text" id="usernameInput" placeholder="Your username…" maxlength="24" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="btn" id="joinBtn">Get Started →</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ═══ GROUPS SCREEN ═══ -->
<div class="screen hidden" id="groupsScreen">
  <div class="topbar">
    <div class="avatar-sm" id="userAvatar"></div>
    <div style="flex:1">
      <div class="topbar-title" id="userNameDisplay"></div>
      <div class="topbar-sub">Choose a group to chat in</div>
    </div>
    <button class="icon-btn" id="logoutBtn" title="Logout">👋</button>
  </div>

  <div class="groups-list" id="groupsList">
    <div style="display:flex;align-items:center;justify-content:center;flex:1;gap:10px;flex-direction:column;padding:60px 0;color:var(--text-muted)">
      <div class="spinner"></div>
      <span>Loading groups…</span>
    </div>
  </div>

  <button class="fab" id="createGroupBtn">＋</button>
</div>

<!-- ═══ CHAT SCREEN ═══ -->
<div class="screen hidden" id="chatScreen">
  <div class="chat-topbar">
    <button class="back-btn" id="backBtn">‹</button>
    <div class="chat-group-icon" id="chatGroupIcon"></div>
    <div class="chat-group-info">
      <div class="chat-group-name" id="chatGroupName"></div>
      <div class="chat-group-members" id="chatGroupMembers">...</div>
    </div>
  </div>

  <div class="messages" id="msgList">
    <div class="loading-msgs"><div class="spinner"></div><span>Loading…</span></div>
  </div>

  <div class="typing-bar" id="typingBar"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msgInput" placeholder="Message…" rows="1"></textarea>
    </div>
    <button class="send-btn" id="sendBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- ═══ CREATE GROUP MODAL ═══ -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Create a Group</h2>
    <p>Give your group a name and a password. Friends need the password to join for the first time.</p>
    <div>
      <label>Group Name</label>
      <input class="field" type="text" id="newGroupName" placeholder="e.g. Squad, Family, Work…" maxlength="32" autocorrect="off">
    </div>
    <div>
      <label>Password</label>
      <input class="field" type="password" id="newGroupPass" placeholder="Group password…" maxlength="32">
    </div>
    <div>
      <label>Pick an icon</label>
      <div id="iconPicker" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px"></div>
    </div>
    <div class="err" id="createErr"></div>
    <button class="btn" id="createConfirmBtn">Create Group</button>
    <button class="btn secondary" id="createCancelBtn">Cancel</button>
  </div>
</div>

<!-- ═══ JOIN GROUP MODAL ═══ -->
<div class="modal-overlay" id="joinModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;gap:12px">
      <div id="joinGroupIcon" style="font-size:32px;line-height:1"></div>
      <div>
        <h2 id="joinGroupTitle"></h2>
        <p style="margin-top:4px" id="joinGroupSub"></p>
      </div>
    </div>
    <div>
      <label>Password</label>
      <input class="field" type="password" id="joinGroupPass" placeholder="Enter group password…" maxlength="32">
    </div>
    <div class="err" id="joinErr"></div>
    <button class="btn" id="joinConfirmBtn">Join Group</button>
    <button class="btn secondary" id="joinCancelBtn">Cancel</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jniiogykevklvjqkqwra.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuaWlvZ3lrZXZrbHZqcWtxd3JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NTI1NTksImV4cCI6MjA4OTQyODU1OX0.i60Zo_VJUsoKFdl_vP33EdvhuMomhXkMJoL4qV3ofgo';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── HELPERS ──────────────────────────────────────────
const COLORS = ['#6366f1','#f43f5e','#f59e0b','#10b981','#2d6ef5','#8b5cf6','#ec4899','#14b8a6','#f97316'];
const ICONS  = ['🏠','🎮','🎵','🏋️','📚','🌴','💼','🎉','❤️','⚽','🍕','✈️','🎨','🐶','🌙'];

const uColor = n => COLORS[n.split('').reduce((a,c)=>a+c.charCodeAt(0),0) % COLORS.length];
const gColor = n => COLORS[(n.split('').reduce((a,c)=>a+c.charCodeAt(0),0)+3) % COLORS.length];
const initials = n => n.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const timeStr = d => new Date(d).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');

function dateLabel(d) {
  const now = new Date(), date = new Date(d);
  if(date.toDateString() === now.toDateString()) return 'Today';
  const y = new Date(now - 86400000);
  if(date.toDateString() === y.toDateString()) return 'Yesterday';
  return date.toLocaleDateString([], {weekday:'long', month:'short', day:'numeric'});
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    if(s.id === id) {
      s.classList.remove('hidden','slide-left');
    } else if(!s.classList.contains('hidden')) {
      s.classList.add('slide-left');
      setTimeout(() => { s.classList.add('hidden'); s.classList.remove('slide-left'); }, 300);
    }
  });
}

// ── STATE ─────────────────────────────────────────────
let username = '';
let joinedGroups = {}; // groupId -> true (stored in localStorage)
let allGroups = [];
let currentGroup = null;
let allMessages = [];
let chatChannel = null;
let presenceChannel = null;
let selectedIcon = ICONS[0];

function loadJoined() {
  try { return JSON.parse(localStorage.getItem('joined_' + username) || '{}'); } catch { return {}; }
}
function saveJoined() { localStorage.setItem('joined_' + username, JSON.stringify(joinedGroups)); }

// ── ICON PICKER ───────────────────────────────────────
const iconPicker = document.getElementById('iconPicker');
ICONS.forEach(icon => {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.textContent = icon;
  btn.style.cssText = `font-size:24px;background:var(--surface2);border:2px solid transparent;border-radius:10px;width:44px;height:44px;cursor:pointer;transition:all 0.15s`;
  btn.addEventListener('click', () => {
    selectedIcon = icon;
    iconPicker.querySelectorAll('button').forEach(b => b.style.borderColor = 'transparent');
    btn.style.borderColor = 'var(--accent)';
  });
  if(icon === ICONS[0]) btn.style.borderColor = 'var(--accent)';
  iconPicker.appendChild(btn);
});

// ── LOGIN ─────────────────────────────────────────────
document.getElementById('usernameInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') document.getElementById('joinBtn').click();
});

document.getElementById('joinBtn').addEventListener('click', () => {
  const val = document.getElementById('usernameInput').value.trim();
  const err = document.getElementById('loginErr');
  if(!val) { err.textContent = 'Please enter a username'; return; }
  if(val.length < 2) { err.textContent = 'At least 2 characters'; return; }
  if(!/^[a-zA-Z0-9_ ]+$/.test(val)) { err.textContent = 'Letters, numbers, spaces and _ only'; return; }
  err.textContent = '';
  username = val;
  joinedGroups = loadJoined();

  const av = document.getElementById('userAvatar');
  av.textContent = initials(username);
  av.style.background = uColor(username);
  document.getElementById('userNameDisplay').textContent = username;

  showScreen('groupsScreen');
  loadGroups();
});

// ── LOGOUT ────────────────────────────────────────────
document.getElementById('logoutBtn').addEventListener('click', () => {
  username = '';
  joinedGroups = {};
  allGroups = [];
  showScreen('loginScreen');
  document.getElementById('usernameInput').value = '';
});

// ── GROUPS ────────────────────────────────────────────
async function loadGroups() {
  const { data, error } = await db.from('groups').select('*').order('created_at', { ascending: true });
  if(error) {
    document.getElementById('groupsList').innerHTML = `<div class="empty-groups"><span>⚠️</span><span>${error.message}</span></div>`;
    return;
  }
  allGroups = data || [];
  renderGroups();
}

function renderGroups() {
  const list = document.getElementById('groupsList');
  list.innerHTML = '';

  if(allGroups.length === 0) {
    list.innerHTML = `<div class="empty-groups"><span>🏕️</span><span style="font-weight:600;color:var(--text)">No groups yet</span><span>Tap + to create the first one!</span></div>`;
    return;
  }

  allGroups.forEach(g => {
    const joined = !!joinedGroups[g.id];
    const card = document.createElement('div');
    card.className = 'group-card' + (joined ? ' joined' : '');
    card.innerHTML = `
      <div class="group-icon" style="background:${gColor(g.name)}22">${g.icon || '💬'}</div>
      <div class="group-info">
        <div class="group-name">${esc(g.name)}</div>
        <div class="group-meta">${joined ? '✅ Joined' : '🔒 Password required'}</div>
      </div>
      <div class="group-arrow">›</div>`;
    card.addEventListener('click', () => openGroup(g, joined));
    list.appendChild(card);
  });
}

// ── CREATE GROUP ──────────────────────────────────────
document.getElementById('createGroupBtn').addEventListener('click', () => {
  document.getElementById('createModal').classList.add('show');
  document.getElementById('newGroupName').focus();
});

document.getElementById('createCancelBtn').addEventListener('click', () => {
  document.getElementById('createModal').classList.remove('show');
  document.getElementById('createErr').textContent = '';
  document.getElementById('newGroupName').value = '';
  document.getElementById('newGroupPass').value = '';
});

document.getElementById('createConfirmBtn').addEventListener('click', async () => {
  const name = document.getElementById('newGroupName').value.trim();
  const pass = document.getElementById('newGroupPass').value.trim();
  const err  = document.getElementById('createErr');

  if(!name) { err.textContent = 'Group name is required'; return; }
  if(!pass)  { err.textContent = 'Password is required'; return; }
  if(pass.length < 3) { err.textContent = 'Password must be at least 3 characters'; return; }

  const btn = document.getElementById('createConfirmBtn');
  btn.classList.add('btn-loading');
  err.textContent = '';

  const { data, error } = await db.from('groups').insert({ name, password: pass, icon: selectedIcon }).select().single();
  btn.classList.remove('btn-loading');

  if(error) {
    err.textContent = error.message.includes('unique') ? 'A group with this name already exists' : error.message;
    return;
  }

  joinedGroups[data.id] = true;
  saveJoined();
  allGroups.push(data);
  document.getElementById('createModal').classList.remove('show');
  document.getElementById('newGroupName').value = '';
  document.getElementById('newGroupPass').value = '';
  renderGroups();
  openGroup(data, true);
});

// ── JOIN GROUP ────────────────────────────────────────
let pendingGroup = null;

function openGroup(g, alreadyJoined) {
  if(alreadyJoined) {
    enterChat(g);
  } else {
    pendingGroup = g;
    document.getElementById('joinGroupIcon').textContent = g.icon || '💬';
    document.getElementById('joinGroupTitle').textContent = g.name;
    document.getElementById('joinGroupSub').textContent = 'Enter the group password to join';
    document.getElementById('joinGroupPass').value = '';
    document.getElementById('joinErr').textContent = '';
    document.getElementById('joinModal').classList.add('show');
    setTimeout(() => document.getElementById('joinGroupPass').focus(), 400);
  }
}

document.getElementById('joinCancelBtn').addEventListener('click', () => {
  document.getElementById('joinModal').classList.remove('show');
  pendingGroup = null;
});

document.getElementById('joinGroupPass').addEventListener('keydown', e => {
  if(e.key === 'Enter') document.getElementById('joinConfirmBtn').click();
});

document.getElementById('joinConfirmBtn').addEventListener('click', async () => {
  const pass = document.getElementById('joinGroupPass').value.trim();
  const err  = document.getElementById('joinErr');
  if(!pass) { err.textContent = 'Please enter the password'; return; }

  const btn = document.getElementById('joinConfirmBtn');
  btn.classList.add('btn-loading');
  err.textContent = '';

  const { data, error } = await db.from('groups').select('password').eq('id', pendingGroup.id).single();
  btn.classList.remove('btn-loading');

  if(error || !data) { err.textContent = 'Could not verify password'; return; }
  if(data.password !== pass) { err.textContent = 'Wrong password, try again'; return; }

  joinedGroups[pendingGroup.id] = true;
  saveJoined();
  renderGroups();
  document.getElementById('joinModal').classList.remove('show');
  enterChat(pendingGroup);
  pendingGroup = null;
});

// ── CHAT ──────────────────────────────────────────────
function enterChat(g) {
  currentGroup = g;
  allMessages = [];

  document.getElementById('chatGroupName').textContent = g.name;
  document.getElementById('chatGroupIcon').textContent = g.icon || '💬';
  document.getElementById('chatGroupIcon').style.background = gColor(g.name) + '22';
  document.getElementById('chatGroupMembers').textContent = 'Loading…';
  document.getElementById('msgList').innerHTML = '<div class="loading-msgs"><div class="spinner"></div><span>Loading…</span></div>';
  document.getElementById('typingBar').textContent = '';

  showScreen('chatScreen');
  loadMessages(g.id);
  subscribeChat(g.id);
  document.getElementById('msgInput').focus();
}

document.getElementById('backBtn').addEventListener('click', () => {
  if(chatChannel) { chatChannel.unsubscribe(); chatChannel = null; }
  currentGroup = null;
  showScreen('groupsScreen');
});

async function loadMessages(groupId) {
  const { data, error } = await db
    .from('messages')
    .select('*')
    .eq('group_id', groupId)
    .order('created_at', { ascending: true })
    .limit(200);

  if(error) {
    document.getElementById('msgList').innerHTML = `<div class="loading-msgs" style="color:var(--danger)">⚠️ ${error.message}</div>`;
    return;
  }

  allMessages = data || [];
  renderAll();
}

function renderAll() {
  const list = document.getElementById('msgList');
  list.innerHTML = '';

  if(allMessages.length === 0) {
    list.innerHTML = `<div class="loading-msgs"><span style="font-size:36px">👋</span><span>No messages yet — say hello!</span></div>`;
    return;
  }

  let lastDate = null;
  allMessages.forEach((m, i) => {
    const dl = dateLabel(m.created_at);
    if(dl !== lastDate) {
      const div = document.createElement('div');
      div.className = 'day-divider';
      div.textContent = dl;
      list.appendChild(div);
      lastDate = dl;
    }
    list.appendChild(buildMsg(m, i > 0 ? allMessages[i-1] : null));
  });

  list.scrollTop = list.scrollHeight;
}

function buildMsg(m, prev) {
  const isOut = m.username === username;
  const showSender = !isOut && (!prev || prev.username !== m.username || dateLabel(prev.created_at) !== dateLabel(m.created_at));

  const row = document.createElement('div');
  row.className = 'msg-row ' + (isOut ? 'out' : 'in');

  const avatarHide = !isOut && !showSender;
  row.innerHTML = `
    ${!isOut ? `<div class="msg-avatar-sm" style="background:${uColor(m.username)};${avatarHide?'visibility:hidden':''}">${initials(m.username)}</div>` : ''}
    <div class="msg-col">
      ${showSender ? `<div class="msg-sender" style="color:${uColor(m.username)}">${esc(m.username)}</div>` : ''}
      <div class="bubble">${esc(m.text)}</div>
      <div class="msg-time">${timeStr(m.created_at)}</div>
    </div>`;

  return row;
}

function subscribeChat(groupId) {
  if(chatChannel) chatChannel.unsubscribe();

  chatChannel = db.channel(`group-${groupId}`, {
    config: { presence: { key: username } }
  });

  chatChannel.on('postgres_changes', {
    event: 'INSERT', schema: 'public', table: 'messages',
    filter: `group_id=eq.${groupId}`
  }, ({ new: m }) => {
    if(m.group_id !== groupId) return;
    const list = document.getElementById('msgList');
    if(list.querySelector('.loading-msgs')) list.innerHTML = '';

    const prev = allMessages[allMessages.length - 1] || null;
    const dl = dateLabel(m.created_at);
    if(!prev || dateLabel(prev.created_at) !== dl) {
      const div = document.createElement('div');
      div.className = 'day-divider';
      div.textContent = dl;
      list.appendChild(div);
    }

    list.appendChild(buildMsg(m, prev));
    allMessages.push(m);

    const atBottom = list.scrollHeight - list.scrollTop - list.clientHeight < 150;
    if(atBottom || m.username === username) list.scrollTop = list.scrollHeight;
  });

  // Presence
  chatChannel.on('presence', { event: 'sync' }, () => {
    const count = Object.keys(chatChannel.presenceState()).length;
    document.getElementById('chatGroupMembers').textContent = `${count} member${count!==1?'s':''} online`;
  });

  // Typing
  chatChannel.on('broadcast', { event: 'typing' }, ({ payload }) => {
    if(payload.user === username) return;
    const bar = document.getElementById('typingBar');
    bar.textContent = `${payload.user} is typing…`;
    clearTimeout(bar._t);
    bar._t = setTimeout(() => { bar.textContent = ''; }, 2000);
  });

  chatChannel.subscribe(async status => {
    if(status === 'SUBSCRIBED') {
      await chatChannel.track({ username, joined_at: new Date().toISOString() });
    }
  });
}

// ── SEND ──────────────────────────────────────────────
async function sendMessage() {
  const ta = document.getElementById('msgInput');
  const text = ta.value.trim();
  if(!text || !currentGroup) return;

  ta.value = '';
  ta.style.height = 'auto';

  const { error } = await db.from('messages').insert({ username, text, group_id: currentGroup.id });
  if(error) alert('Send failed: ' + error.message);
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);

document.getElementById('msgInput').addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  if(chatChannel) chatChannel.send({ type: 'broadcast', event: 'typing', payload: { user: username } });
});

// Close modals on backdrop tap
document.getElementById('createModal').addEventListener('click', function(e) {
  if(e.target === this) document.getElementById('createCancelBtn').click();
});
document.getElementById('joinModal').addEventListener('click', function(e) {
  if(e.target === this) document.getElementById('joinCancelBtn').click();
});
</script>
</body>
